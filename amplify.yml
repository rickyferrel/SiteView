version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Pin Node 24 — the app targets it and Amplify's default image may be older.
        - nvm install 24
        - nvm use 24
        - npm ci
    build:
      commands:
        # Amplify console env vars exist only at build time; persist the
        # server-side ones into .env.production so the SSR (Lambda) runtime
        # can read them. Without this, db.ts sees no PGHOST at runtime and
        # falls back to PGlite → OOM.
        - node scripts/write-env.mjs
        - npm run build
  artifacts:
    # Amplify's Next.js SSR (WEB_COMPUTE) adapter reads .next; baseDirectory is
    # the app root for a non-monorepo project.
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
